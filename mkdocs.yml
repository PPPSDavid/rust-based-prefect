site_name: Project IronFlow
site_description: Rust orchestration kernel with Prefect-style Python authoring (prefect_compat)
site_url: https://pppsdavid.github.io/rust-based-prefect/
repo_url: https://github.com/PPPSDavid/rust-based-prefect
edit_uri: edit/main/docs/

# Published site = end-user docs only. Maintainer/roadmap/CI notes stay in-repo for GitHub browsing.
exclude_docs: |
  MEMORY_BANK.md
  DISTRIBUTION.md
  benchmark_baseline.md
  perf_baseline_pre_next_step.md
  perf_candidate*.md
  perf_compare*.md
  perf_design_note.md
  perf_matrix_summary.md
  perf_methodology.md
  ui_phase1_api_contract.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - "Quick start (demo flow)": QUICKSTART_DEMO.md
  - Architecture: architecture.md
  - "Performance (vs Prefect)": PERFORMANCE_OVERVIEW.md
  - "Prefect → IronFlow": PREFECT_IRONFLOW_MAPPING.md
  - Compatibility: compatibility.md
  - "Optional: verify the web UI": ui_e2e_visual_check.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - tables
  - toc:
      permalink: true

strict: true
